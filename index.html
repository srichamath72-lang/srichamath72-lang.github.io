<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineLanka - Movies from Sri Lanka & the World</title>

<style>
:root{--bg:#09090b;--card:#18181b;--card2:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--text:#fff;--dim:#a1a1aa;--dimmer:#71717a;--p1:#a855f7;--p2:#ec4899;--amber:#fbbf24;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit;}
input,textarea,select{font-family:inherit;}
a{color:inherit;text-decoration:none;}
.container{max-width:1280px;margin:0 auto;padding:0 16px;}

/* AD SLOTS */
.ad-slot{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--dimmer);font-size:12px;text-align:center;}
.ad-banner{width:100%;height:90px;margin:8px 0;}
.ad-rectangle{width:100%;max-width:336px;height:280px;margin:0 auto;}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(20px);background:rgba(9,9,11,.85);border-bottom:1px solid var(--border);}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;height:64px;}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;flex-shrink:0;}
.logo-icon{padding:6px;border-radius:8px;background:linear-gradient(135deg,var(--p1),var(--p2));font-size:16px;}
.gradient-text{background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.nav-links{display:none;align-items:center;gap:2px;}
.nav-link{padding:7px 11px;border-radius:8px;font-size:13px;font-weight:500;color:var(--dim);transition:.2s;display:flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;}
.nav-link:hover{color:var(--text);}
.nav-link.active{color:var(--text);background:var(--card2);}
.badge-count{font-size:10px;background:var(--p1);color:#fff;border-radius:999px;padding:0 5px;}
.nav-right{display:flex;align-items:center;gap:8px;}
.search-wrap{display:none;position:relative;width:200px;}
.search-input{width:100%;background:var(--card2);border:1px solid var(--border);outline:none;border-radius:8px;padding:8px 30px 8px 34px;font-size:13px;color:var(--text);transition:.2s;}
.search-input:focus{border-color:var(--p1);}
.search-input::placeholder{color:var(--dimmer);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dimmer);font-size:13px;pointer-events:none;}
.search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);color:var(--dimmer);font-size:12px;padding:3px;}
.lang-btn{padding:6px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--dim);}
.lang-btn:hover{color:var(--text);}
.signin-btn{display:none;padding:8px 16px;border-radius:8px;background:linear-gradient(90deg,var(--p1),var(--p2));font-size:13px;font-weight:600;color:#fff;white-space:nowrap;}
.menu-btn{padding:8px;color:var(--dim);font-size:20px;}
.mobile-menu{border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:6px;}
.mobile-search{position:relative;margin-bottom:4px;}
@media(min-width:768px){.nav-links{display:flex;}.search-wrap{display:block;}.signin-btn{display:block;}.menu-btn{display:none;}}

/* HERO */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.hero-bg{position:absolute;inset:0;opacity:.25;}
.hero-blob{position:absolute;width:350px;height:350px;border-radius:50%;filter:blur(80px);opacity:.2;}
.hero-blob1{top:-80px;left:-80px;background:var(--p1);}
.hero-blob2{bottom:-80px;right:-80px;background:var(--p2);}
.hero-content{position:relative;max-width:640px;padding:48px 0;}
.hero-tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
.tag-grad{background:linear-gradient(90deg,var(--p1),var(--p2));}
.tag-soft{background:var(--card2);}
.hero-title{font-size:32px;font-weight:800;line-height:1.1;margin-bottom:12px;}
.hero-meta{display:flex;gap:14px;font-size:13px;color:var(--dim);margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.star-gold{color:var(--amber);}
.hero-desc{color:var(--dim);font-size:14px;line-height:1.7;margin-bottom:20px;}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;transition:.2s;cursor:pointer;}
.btn-white{background:#fff;color:#000;}
.btn-white:hover{background:#e4e4e7;}
.btn-outline{background:transparent;color:#fff;border:1px solid var(--border);}
.btn-outline:hover{background:var(--card2);}
.btn-grad{background:linear-gradient(90deg,var(--p1),var(--p2));color:#fff;border:none;}
.btn-grad:hover{opacity:.9;}
.btn-sm{padding:7px 14px;font-size:12px;}
@media(min-width:640px){.hero-title{font-size:48px;}}

/* STATS */
.stats{border-bottom:1px solid var(--border);background:rgba(24,24,27,.4);}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:20px 0;text-align:center;}
.stat-num{font-size:22px;font-weight:800;background:linear-gradient(90deg,#c084fc,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-size:12px;color:var(--dim);margin-top:2px;}
@media(min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr);}.stat-num{font-size:28px;}}

/* FILTERS */
.filter-bar{padding:16px 0 8px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.tab{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;background:var(--card2);color:var(--dim);border:1px solid var(--border);transition:.2s;}
.tab.active{background:linear-gradient(90deg,var(--p1),var(--p2));color:#fff;border-color:transparent;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 11px;border-radius:999px;font-size:11px;font-weight:500;background:var(--card2);color:var(--dim);border:1px solid var(--border);cursor:pointer;}
.chip.active{background:#fff;color:#000;border-color:#fff;}
.advanced-filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.filter-select{padding:7px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;outline:none;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr;gap:24px;padding:24px 0;}
@media(min-width:1024px){.layout{grid-template-columns:1fr 300px;}}
main{min-height:400px;}
.sidebar{display:flex;flex-direction:column;gap:20px;}
.sidebar-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.sidebar-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* SECTION */
.section{margin-bottom:40px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:17px;font-weight:800;display:flex;align-items:center;gap:7px;}
.view-all{font-size:12px;font-weight:600;color:var(--p1);display:flex;align-items:center;gap:3px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.card{cursor:pointer;}
.poster-wrap{position:relative;aspect-ratio:2/3;border-radius:10px;overflow:hidden;border:1px solid var(--border);transition:.25s;}
.card:hover .poster-wrap{border-color:rgba(168,85,247,.7);transform:scale(1.04);box-shadow:0 16px 32px rgba(0,0,0,.5);}
.poster-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.15;}
.poster-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.poster-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.05) 55%,transparent);}
.poster-info{position:absolute;bottom:0;left:0;right:0;padding:8px;}
.poster-title{font-weight:700;font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;}
.poster-year{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px;}
.poster-rating{position:absolute;top:6px;right:6px;display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);border-radius:999px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--amber);}
.poster-bm{position:absolute;top:6px;left:6px;padding:5px;border-radius:999px;background:rgba(0,0,0,.5);font-size:11px;line-height:1;transition:.2s;}
.poster-bm.on{background:var(--p1);}
.poster-badge{position:absolute;top:30px;left:6px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px;background:linear-gradient(90deg,var(--p1),var(--p2));}
.poster-rank{position:absolute;bottom:0;left:3px;font-size:34px;font-weight:900;color:rgba(255,255,255,.9);text-shadow:1px 1px 0 rgba(0,0,0,.5);line-height:1;}
.poster-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);opacity:0;transition:.2s;}
.card:hover .poster-play{opacity:1;}
.poster-play-btn{background:#fff;color:#000;border-radius:999px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.card-meta{margin-top:6px;}
.card-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:11px;color:var(--dim);}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;border-radius:12px;border:1px dashed var(--border);background:rgba(24,24,27,.4);}
.empty-icon{font-size:32px;opacity:.4;margin-bottom:10px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:12px;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);}
.modal{position:relative;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;border-radius:16px;background:var(--card);border:1px solid var(--border);}
.modal-hero{position:relative;height:160px;}
.modal-hero-img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.15;}
.modal-shade{position:absolute;inset:0;background:linear-gradient(to top,var(--card),rgba(24,24,27,.1),transparent);}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);border-radius:999px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:2;}
.modal-titlewrap{position:relative;padding:0 20px 14px;}
.modal-tags{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.modal-title{font-size:22px;font-weight:800;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.modal-meta{display:flex;gap:12px;font-size:13px;color:var(--dim);flex-wrap:wrap;align-items:center;}
.genre-tags{display:flex;gap:6px;flex-wrap:wrap;}
.genre-tag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;background:var(--card2);border:1px solid var(--border);}
.modal-desc{color:var(--dim);line-height:1.7;font-size:13px;}
.modal-row{font-size:13px;color:var(--dim);}
.modal-row b{color:var(--text);font-weight:600;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}
.modal-ad{margin-top:4px;}

/* REVIEWS */
.reviews-section{border-top:1px solid var(--border);padding-top:16px;}
.review-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.review-stars{display:flex;gap:4px;font-size:22px;cursor:pointer;}
.review-star{color:var(--dimmer);transition:.1s;}
.review-star.on{color:var(--amber);}
.review-textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;resize:vertical;min-height:70px;outline:none;}
.review-textarea:focus{border-color:var(--p1);}
.review-name{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;}
.review-name:focus{border-color:var(--p1);}
.review-list{display:flex;flex-direction:column;gap:10px;}
.review-item{background:var(--card2);border-radius:8px;padding:12px;}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.review-author{font-size:13px;font-weight:600;}
.review-date{font-size:11px;color:var(--dimmer);}
.review-stars-disp{font-size:13px;margin-bottom:4px;}
.review-text{font-size:13px;color:var(--dim);}
.no-reviews{text-align:center;color:var(--dimmer);font-size:13px;padding:12px 0;}

/* NEWSLETTER */
.newsletter{position:relative;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.newsletter-bg{position:absolute;inset:0;background:linear-gradient(120deg,#7e22ce,#db2777,#f59e0b);opacity:.9;}
.newsletter-content{position:relative;max-width:500px;margin:0 auto;padding:40px 16px;text-align:center;}
.nl-icon{font-size:28px;margin-bottom:10px;}
.nl-title{font-size:22px;font-weight:800;margin-bottom:6px;}
.nl-desc{color:rgba(255,255,255,.9);margin-bottom:20px;font-size:13px;}
.nl-form{display:flex;flex-direction:column;gap:10px;max-width:360px;margin:0 auto;}
.nl-input{padding:11px 14px;border-radius:8px;border:none;background:rgba(255,255,255,.95);color:#18181b;font-size:13px;outline:2px solid transparent;}
.nl-input:focus{outline-color:#fff;}
.nl-btn{padding:11px 20px;border-radius:8px;background:#09090b;color:#fff;font-weight:700;font-size:13px;}
.nl-success{font-size:14px;font-weight:600;background:rgba(255,255,255,.15);border-radius:8px;padding:10px 16px;display:inline-block;}
@media(min-width:540px){.nl-form{flex-direction:row;}}

/* FOOTER */
.footer{padding:36px 0;}
.footer-grid{display:grid;grid-template-columns:1fr;gap:24px;}
.footer-col h3{font-size:13px;font-weight:700;margin-bottom:10px;}
.footer-link{font-size:13px;color:var(--dim);margin-bottom:7px;display:block;cursor:pointer;}
.footer-link:hover{color:#fff;}
.footer-desc{font-size:13px;color:var(--dim);line-height:1.6;margin:10px 0;}
.social-icons{display:flex;gap:12px;font-size:17px;}
.footer-bottom{border-top:1px solid var(--border);margin-top:24px;padding-top:16px;text-align:center;font-size:11px;color:var(--dimmer);}
@media(min-width:640px){.footer-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1024px){.footer-grid{grid-template-columns:repeat(4,1fr);}}

/* LOGIN MODAL */
.auth-modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:360px;}
.auth-title{font-size:20px;font-weight:800;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--dim);margin-bottom:20px;}
.auth-field{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;margin-bottom:10px;outline:none;}
.auth-field:focus{border-color:var(--p1);}
.auth-or{text-align:center;color:var(--dimmer);font-size:12px;margin:12px 0;}
.auth-google{width:100%;padding:10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;}
.auth-switch{text-align:center;font-size:12px;color:var(--dim);margin-top:14px;}
.auth-switch span{color:var(--p1);cursor:pointer;}
.auth-close{float:right;color:var(--dimmer);font-size:16px;}
</style>
</head>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

function fmt(mins){const h=Math.floor(mins/60);const m=mins%60;return h+'h '+m+'m';}

function AdBanner(){return(<div className="ad-slot ad-banner">📢 Advertisement — <small>Google AdSense will appear here</small></div>);}
function AdRect(){return(<div className="ad-slot ad-rectangle">📢<br/>Advertisement<br/><small>336×280 AdSense</small></div>);}

function StarRater({val,onChange}){
  const [hov,setHov]=useState(0);
  return(
    <div className="review-stars">
      {[1,2,3,4,5].map(s=>(
        <span key={s} className={'review-star'+(( hov||val)>=s?' on':'')} onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)} onClick={()=>onChange(s)}>★</span>
      ))}
    </div>
  );
}

function ReviewSection({movieId,lang}){
  const t=T[lang];
  const key='reviews_'+movieId;
  const [reviews,setReviews]=useState(()=>{try{return JSON.parse(localStorage.getItem(key)||'[]');}catch{return[];}});
  const [name,setName]=useState('');
  const [text,setText]=useState('');
  const [stars,setStars]=useState(0);

  function submit(){
    if(!text.trim()||!stars)return;
    const r={id:Date.now(),name:name.trim()||'Anonymous',text:text.trim(),stars,date:new Date().toLocaleDateString()};
    const updated=[r,...reviews];
    setReviews(updated);
    localStorage.setItem(key,JSON.stringify(updated));
    setName('');setText('');setStars(0);
  }

  return(
    <div className="reviews-section">
      <h3 style={{fontWeight:800,fontSize:15,marginBottom:14}}>{t.reviews} ({reviews.length})</h3>
      <div className="review-form">
        <div style={{fontSize:13,color:'var(--dim)',marginBottom:2}}>{t.rateThis}</div>
        <StarRater val={stars} onChange={setStars}/>
        <input className="review-name" placeholder={t.yourName} value={name} onChange={e=>setName(e.target.value)}/>
        <textarea className="review-textarea" placeholder={t.yourReview} value={text} onChange={e=>setText(e.target.value)}/>
        <button className="btn btn-grad btn-sm" onClick={submit}>{t.submitReview}</button>
      </div>
      {reviews.length===0?(<div className="no-reviews">{t.noReviews}</div>):(
        <div className="review-list">
          {reviews.map(r=>(
            <div key={r.id} className="review-item">
              <div className="review-header">
                <span className="review-author">{r.name}</span>
                <span className="review-date">{r.date}</span>
              </div>
              <div className="review-stars-disp">{'★'.repeat(r.stars)+'☆'.repeat(5-r.stars)}</div>
              <div className="review-text">{r.text}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MovieModal({movie,onClose,inWatchlist,onToggle,lang}){
  const t=T[lang];
  const title=lang==='si'&&movie.titleSi?movie.titleSi:movie.title;
  const desc=lang==='si'&&movie.descSi?movie.descSi:movie.desc;
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-hero" style={{background:movie.gradient}}>
          <div className="modal-hero-bg">🎬</div>
          <div className="modal-shade"></div>
          <button className="modal-close" onClick={onClose}>✕</button>
          <div className="modal-titlewrap">
            <div className="modal-tags">
              <span className="tag tag-soft">{movie.type==='srilanka'?'🇱🇰 '+t.srilanka:'🌍 '+t.world}</span>
              {movie.badge&&<span className="tag tag-grad">{movie.badge}</span>}
            </div>
            <h2 className="modal-title">{title}</h2>
          </div>
        </div>
        <div className="modal-body">
          <div className="modal-meta">
            <span className="star-gold">⭐ {movie.rating}/10</span>
            <span>{movie.year}</span>
            <span>🕐 {fmt(movie.runtime)}</span>
          </div>
          <div className="genre-tags">{movie.genres.map(g=><span key={g} className="genre-tag">{g}</span>)}</div>
          <p className="modal-desc">{desc}</p>
          <div className="modal-row"><b>{t.director}:</b> {movie.director}</div>
          <div className="modal-row"><b>{t.cast}:</b> {movie.cast.join(', ')}</div>
          <div className="modal-actions">
            <button className="btn btn-white btn-sm">▶ {t.watchTrailer}</button>
            <button className={"btn btn-sm "+(inWatchlist?'btn-grad':'btn-outline')} onClick={()=>onToggle(movie.id)}>
              🔖 {inWatchlist?t.inList:t.addList}
            </button>
          </div>
          <div className="modal-ad"><AdBanner/></div>
          <ReviewSection movieId={movie.id} lang={lang}/>
        </div>
      </div>
    </div>
  );
}

function Card({movie,onSelect,inWatchlist,onToggle,rank,lang}){
  const title=lang==='si'&&movie.titleSi?movie.titleSi:movie.title;
  return(
    <div className="card" onClick={()=>onSelect(movie)}>
      <div className="poster-wrap">
        <div className="poster-bg" style={{background:movie.gradient}}>🎬</div>
        <div className="poster-shade"></div>
        <button className={"poster-bm"+(inWatchlist?' on':'')} onClick={e=>{e.stopPropagation();onToggle(movie.id);}}>🔖</button>
        {movie.badge&&<div className="poster-badge">{movie.badge}</div>}
        {rank&&<div className="poster-rank">{rank}</div>}
        <div className="poster-info">
          <div className="poster-title">{title}</div>
          <div className="poster-year">{movie.year}</div>
        </div>
        <div className="poster-rating">⭐ {movie.rating}</div>
        <div className="poster-play"><div className="poster-play-btn">▶</div></div>
      </div>
      <div className="card-meta">
        <div className="card-title">{title}</div>
        <div className="card-sub">{movie.year} · {movie.genres[0]}</div>
      </div>
    </div>
  );
}

function Grid({movies,onSelect,watchlist,onToggle,ranked,lang}){
  if(!movies.length)return(
    <div className="empty">
      <div className="empty-icon">🎬</div>
      <div style={{color:'var(--dim)',fontWeight:600}}>No movies found</div>
      <div style={{color:'var(--dimmer)',fontSize:13,marginTop:4}}>Try adjusting filters.</div>
    </div>
  );
  return(<div className="grid">{movies.map((m,i)=><Card key={m.id} movie={m} onSelect={onSelect} inWatchlist={watchlist.includes(m.id)} onToggle={onToggle} rank={ranked?i+1:null} lang={lang}/>)}</div>);
}

        <button className="btn btn-grad" style={{width:'100%',justifyContent:'center'}}>{mode==='login'?t.signin:t.registerTitle}</button>
        <div className="auth-or">— {t.orContinue} —</div>
        <button className="auth-google">🔵 Google</button>
        <div className="auth-switch">
          {mode==='login'?<span onClick={()=>setMode('register')}>{t.signupLink}</span>:<span onClick={()=>setMode('login')}>{t.loginLink}</span>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [lang,setLang]=useState('en');
  const t=T[lang];
  const [search,setSearch]=useState('');
  const [category,setCategory]=useState('all');
  const [genre,setGenre]=useState('All');
  const [view,setView]=useState('browse');
  const [selected,setSelected]=useState(null);
  const [showAuth,setShowAuth]=useState(false);
  const [user,setUser]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [email,setEmail]=useState('');
  const [subscribed,setSubscribed]=useState(false);
  const [yearFrom,setYearFrom]=useState('');
  const [yearTo,setYearTo]=useState('');
  const [minRating,setMinRating]=useState('');
  const [watchlist,setWatchlist]=useState(()=>{try{return JSON.parse(localStorage.getItem('wl')||'[]');}catch{return[];}});

  useEffect(()=>{localStorage.setItem('wl',JSON.stringify(watchlist));},[watchlist]);

  const toggleWL=(id)=>setWatchlist(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const goTo=(cat)=>{setView('browse');setCategory(cat);setGenre('All');setSearch('');setMenuOpen(false);};
  const isFiltering=search.trim()!==''||genre!=='All'||yearFrom||yearTo||minRating;

  const filtered=MOVIES.filter(m=>{
    if(category!=='all'&&m.type!==category)return false;
    if(genre!=='All'&&!m.genres.includes(genre))return false;
    if(search.trim()&&!m.title.toLowerCase().includes(search.trim().toLowerCase())&&!(m.titleSi&&m.titleSi.includes(search.trim())))return false;
    if(yearFrom&&m.year<parseInt(yearFrom))return false;
    if(yearTo&&m.year>parseInt(yearTo))return false;
    if(minRating&&m.rating<parseFloat(minRating))return false;
    return true;
  });

  const featured=MOVIES.find(m=>m.badge==='Featured')||MOVIES[0];
  const trending=MOVIES.filter(m=>m.trending);
  const topRated=[...MOVIES].sort((a,b)=>b.rating-a.rating).slice(0,6);
  const sriPreview=MOVIES.filter(m=>m.type==='srilanka').slice(0,6);
  const worldPreview=MOVIES.filter(m=>m.type==='world').slice(0,6);
  const newRel=MOVIES.filter(m=>m.year>=2023);
  const wlMovies=MOVIES.filter(m=>watchlist.includes(m.id));
  const featTitle=lang==='si'&&featured.titleSi?featured.titleSi:featured.title;
  const featDesc=lang==='si'&&featured.descSi?featured.descSi:featured.desc;

  return(
    <div>
      {/* NAVBAR */}
      <nav className="navbar">
        <div className="container navbar-inner">
          <button className="logo" onClick={()=>goTo('all')}>
            <span className="logo-icon">🎬</span>
            <span>Cine<span className="gradient-text">Lanka</span></span>
          </button>
          <div className="nav-links">
            <button className={"nav-link"+(view==='browse'&&category==='all'?' active':'')} onClick={()=>goTo('all')}>{t.home}</button>
            <button className={"nav-link"+(view==='browse'&&category==='srilanka'?' active':'')} onClick={()=>goTo('srilanka')}>🇱🇰 {t.srilanka}</button>
            <button className={"nav-link"+(view==='browse'&&category==='world'?' active':'')} onClick={()=>goTo('world')}>🌍 {t.world}</button>
            <button className={"nav-link"+(view==='watchlist'?' active':'')} onClick={()=>{setView('watchlist');setMenuOpen(false);}}>
              🔖 {t.mylist} {watchlist.length>0&&<span className="badge-count">{watchlist.length}</span>}
            </button>
          </div>
          <div className="nav-right">
            <div className="search-wrap">
              <span className="search-icon">🔍</span>
              <input className="search-input" value={search} onChange={e=>{setSearch(e.target.value);setView('browse');}} placeholder={t.search}/>
              {search&&<button className="search-clear" onClick={()=>setSearch('')}>✕</button>}
            </div>
            <button className="lang-btn" onClick={()=>setLang(l=>l==='en'?'si':'en')}>{lang==='en'?'සිං':'EN'}</button>
            {user?(
              <button className="signin-btn" onClick={()=>setUser(null)}>{t.signout}</button>
            ):(
              <button className="signin-btn" onClick={()=>setShowAuth(true)}>{t.signin}</button>
            )}
            <button className="menu-btn" onClick={()=>setMenuOpen(!menuOpen)}>{menuOpen?'✕':'☰'}</button>
          </div>
        </div>
        {menuOpen&&(
          <div className="mobile-menu">
            <div className="mobile-search" style={{position:'relative'}}>
              <span className="search-icon">🔍</span>
              <input className="search-input" value={search} onChange={e=>{setSearch(e.target.value);setView('browse');}} placeholder={t.search}/>
            </div>
            <button className="nav-link" onClick={()=>goTo('all')}>{t.home}</button>
            <button className="nav-link" onClick={()=>goTo('srilanka')}>🇱🇰 {t.srilanka}</button>
            <button className="nav-link" onClick={()=>goTo('world')}>🌍 {t.world}</button>
            <button className="nav-link" onClick={()=>{setView('watchlist');setMenuOpen(false);}}>🔖 {t.mylist} ({watchlist.length})</button>
            <button className="lang-btn" style={{width:'fit-content'}} onClick={()=>setLang(l=>l==='en'?'si':'en')}>{lang==='en'?'සිංහල':'English'}</button>
            <button className="signin-btn" style={{display:'block',textAlign:'center'}} onClick={()=>{setShowAuth(true);setMenuOpen(false);}}>{t.signin}</button>
          </div>
        )}
      </nav>

      {/* ADSENSE TOP BANNER */}
      <div className="container"><AdBanner/></div>

      {/* HERO */}
      {view==='browse'&&category==='all'&&!isFiltering&&(
        <>
          <section className="hero">
            <div className="hero-bg" style={{background:featured.gradient}}></div>
            <div className="hero-blob hero-blob1"></div>
            <div className="hero-blob hero-blob2"></div>
            <div className="container">
              <div className="hero-content">
                <div className="hero-tags">
                  <span className="tag tag-grad">FEATURED</span>
                  <span className="tag tag-soft">🇱🇰 {t.srilanka}</span>
                </div>
                <h1 className="hero-title">{featTitle}</h1>
                <div className="hero-meta">
                  <span className="star-gold">⭐ {featured.rating}/10</span>
                  <span>{featured.year}</span>
                  <span>🕐 {fmt(featured.runtime)}</span>
                </div>
                <p className="hero-desc">{featDesc}</p>
                <div className="hero-btns">
                  <button className="btn btn-white" onClick={()=>setSelected(featured)}>▶ {t.watchTrailer}</button>
                  <button className="btn btn-outline" onClick={()=>toggleWL(featured.id)}>🔖 {watchlist.includes(featured.id)?t.inList:t.addList}</button>
                </div>
              </div>
            </div>
          </section>
          <section className="stats">
            <div className="container stats-grid">
              <div><div className="stat-num">10,000+</div><div className="stat-label">Movies & Shows</div></div>
              <div><div className="stat-num">500+</div><div className="stat-label">Sri Lankan Films</div></div>
              <div><div className="stat-num">1.2M</div><div className="stat-label">Active Users</div></div>
              <div><div className="stat-num">4.9/5</div><div className="stat-label">User Rating</div></div>
            </div>
          </section>
        </>
      )}

      {/* FILTERS */}
      {view==='browse'&&(
        <div className="container filter-bar">
          <div className="tabs">
            <button className={"tab"+(category==='all'?' active':'')} onClick={()=>{setCategory('all');setSearch('');}}>All</button>
            <button className={"tab"+(category==='srilanka'?' active':'')} onClick={()=>{setCategory('srilanka');setSearch('');}}>🇱🇰 {t.srilanka}</button>
            <button className={"tab"+(category==='world'?' active':'')} onClick={()=>{setCategory('world');setSearch('');}}>🌍 {t.world}</button>
          </div>
          <div className="chips">
            {ALL_GENRES.map(g=><button key={g} className={"chip"+(genre===g?' active':'')} onClick={()=>setGenre(g)}>{g}</button>)}
          </div>
          <div className="advanced-filters">
            <select className="filter-select" value={yearFrom} onChange={e=>setYearFrom(e.target.value)}>
              <option value="">{t.yearFrom}</option>
              {[1960,1970,1980,1990,2000,2010,2015,2020,2023].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <select className="filter-select" value={yearTo} onChange={e=>setYearTo(e.target.value)}>
              <option value="">{t.yearTo}</option>
              {[2024,2023,2020,2015,2010,2000].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <select className="filter-select" value={minRating} onChange={e=>setMinRating(e.target.value)}>
              <option value="">{t.minRating}</option>
              {[9,8.5,8,7.5,7].map(r=><option key={r} value={r}>{r}+</option>)}
            </select>
            {(yearFrom||yearTo||minRating)&&<button className="chip active" onClick={()=>{setYearFrom('');setYearTo('');setMinRating('');}}>✕ Clear</button>}
          </div>
        </div>
      )}

      {/* MAIN + SIDEBAR */}
      <div className="container">
        <div className="layout">
          <main>
            {view==='watchlist'?(
              <div className="section">
                <div className="section-header"><h2 className="section-title">🔖 {t.mylist}</h2></div>
                {wlMovies.length===0?(
                  <div className="empty">
                    <div className="empty-icon">🔖</div>
                    <div style={{color:'var(--dim)',fontWeight:600}}>{t.emptyWatchlist}</div>
                    <div style={{marginTop:12}}><button className="btn btn-grad btn-sm" onClick={()=>goTo('all')}>{t.browseMovies}</button></div>
                  </div>
                ):(
                  <Grid movies={wlMovies} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
                )}
              </div>
            ):isFiltering||category!=='all'?(
              <div className="section">
                <div className="section-header">
                  <h2 className="section-title">
                    {isFiltering?'🔍':category==='srilanka'?'🇱🇰':'🌍'}
                    {isFiltering?' '+t.results+' ('+filtered.length+')':category==='srilanka'?' '+t.srilanka:' '+t.world}
                  </h2>
                </div>
                <Grid movies={filtered} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
              </div>
            ):(
              <>
                <div className="section">
                  <div className="section-header"><h2 className="section-title">📈 {t.trending}</h2></div>
                  <Grid movies={trending} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
                </div>
                <AdBanner/>
                <div className="section">
                  <div className="section-header"><h2 className="section-title">🏆 {t.toprated}</h2></div>
                  <Grid movies={topRated} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} ranked lang={lang}/>
                </div>
                <div className="section">
                  <div className="section-header">
                    <h2 className="section-title">🇱🇰 {t.srilanka}</h2>
                    <button className="view-all" onClick={()=>goTo('srilanka')}>{t.viewAll} ›</button>
                  </div>
                  <Grid movies={sriPreview} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
                </div>
                <AdBanner/>
                <div className="section">
                  <div className="section-header">
                    <h2 className="section-title">🌍 {t.world}</h2>
                    <button className="view-all" onClick={()=>goTo('world')}>{t.viewAll} ›</button>
                  </div>
                  <Grid movies={worldPreview} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
                </div>
                <div className="section">
                  <div className="section-header"><h2 className="section-title">🎬 {t.newrel}</h2></div>
                  <Grid movies={newRel} onSelect={setSelected} watchlist={watchlist} onToggle={toggleWL} lang={lang}/>
                </div>
              </>
            )}
          </main>

          {/* SIDEBAR */}
          <aside className="sidebar">
            <div className="sidebar-section">
              <div className="sidebar-title">📢 Advertisement</div>
              <AdRect/>
            </div>
            <div className="sidebar-section">
              <div className="sidebar-title">🏆 {t.toprated}</div>
              {[...MOVIES].sort((a,b)=>b.rating-a.rating).slice(0,5).map((m,i)=>(
                <div key={m.id} onClick={()=>setSelected(m)} style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                  <span style={{fontSize:18,fontWeight:800,color:'var(--dimmer)',minWidth:22}}>{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.title}</div>
                    <div style={{fontSize:11,color:'var(--dim)'}}>{m.year} · ⭐ {m.rating}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="sidebar-section">
              <div className="sidebar-title">📢 Advertisement</div>
              <AdRect/>
            </div>
          </aside>
        </div>
      </div>

      {/* NEWSLETTER */}
      <section className="newsletter">
        <div className="newsletter-bg"></div>
        <div className="newsletter-content">
          <div className="nl-icon">✉️</div>
          <h2 className="nl-title">{t.newsletterTitle}</h2>
          <p className="nl-desc">{t.newsletterDesc}</p>
          {subscribed?(<p className="nl-success">{t.subscribed}</p>):(
            <div className="nl-form">
              <input className="nl-input" value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder={t.emailPlaceholder}/>
              <button className="nl-btn" onClick={()=>{if(email.trim())setSubscribed(true);}}>{t.subscribe}</button>
            </div>
          )}
        </div>
      </section>

      {/* FOOTER */}
      <footer className="footer">
        <div className="container footer-grid">
          <div>
            <div className="logo" style={{marginBottom:4}}>
              <span className="logo-icon">🎬</span>
              <span>Cine<span className="gradient-text">Lanka</span></span>
            </div>
            <p className="footer-desc">Your home for Sri Lankan and world cinema — discover, rate, and track everything you watch.</p>
            <div className="social-icons">📘 📷 🐦 ▶️</div>
          </div>
          <div>
            <h3>Browse</h3>
            <button className="footer-link" onClick={()=>goTo('all')}>{t.home}</button>
            <button className="footer-link" onClick={()=>goTo('srilanka')}>{t.srilanka}</button>
            <button className="footer-link" onClick={()=>goTo('world')}>{t.world}</button>
            <button className="footer-link" onClick={()=>setView('watchlist')}>{t.mylist}</button>
          </div>
          <div>
            <h3>Genres</h3>
            {['Drama','Action','Thriller','Sci-Fi','Comedy'].map(g=>(
              <button key={g} className="footer-link" onClick={()=>{setCategory('all');setGenre(g);}}>{g}</button>
            ))}
          </div>
          <div>
            <h3>Company</h3>
            <span className="footer-link">About Us</span>
            <span className="footer-link">Careers</span>
            <span className="footer-link">Contact</span>
            <span className="footer-link">Privacy Policy</span>
            <span className="footer-link">Advertise</span>
          </div>
        </div>
        <div className="footer-bottom">© 2026 CineLanka. All rights reserved.</div>
      </footer>

      {selected&&<MovieModal movie={selected} onClose={()=>setSelected(null)} inWatchlist={watchlist.includes(selected.id)} onToggle={toggleWL} lang={lang}/>}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} lang={lang}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
<script src="watch-links.js"></script>
</body>
  </html>
